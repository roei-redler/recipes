<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ספר המתכונים</title>

    <!-- SEO & social meta tags -->
    <meta name="description" content="ספר המתכונים האישי שלך — שמור, נהל ובשל מתכונים אהובים עם מצב בישול מודרך, שעוני עצר לכל שלב ועיצוב נוח לשימוש." />
    <meta name="keywords" content="מתכונים, בישול, אפייה, ספר מתכונים, מתכוני בית" />
    <meta name="author" content="ספר המתכונים" />
    <meta name="theme-color" content="#1c1917" />

    <!-- Open Graph (WhatsApp / Facebook / Telegram) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ספר המתכונים" />
    <meta property="og:description" content="ספר המתכונים האישי שלך — שמור, נהל ובשל מתכונים אהובים עם מצב בישול מודרך ושעוני עצר." />
    <meta property="og:locale" content="he_IL" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="ספר המתכונים" />
    <meta name="twitter:description" content="ספר המתכונים האישי שלך — שמור, נהל ובשל מתכונים אהובים." />

    <!-- SPA redirect handler for GitHub Pages -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
