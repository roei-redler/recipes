  <!-- Chef hat: body/dome blending into brim -->
  <path d="M9.5 21.5 V16 C9.5 11.5 12 8.5 16 8.5 C20 8.5 22.5 11.5 22.5 16 V21.5 Z" fill="white"/>

  <!-- Chef hat: brim (wide band) -->
